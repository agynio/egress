name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GO111MODULE: on
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: '1.67.0'
          github_token: ${{ github.token }}
          buf_api_token: ${{ secrets.BUF_TOKEN }}

      - name: Install native build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc

      - name: Install protobuf generators
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Generate, lint, test, and build
        env:
          BUF_TOKEN: ${{ secrets.BUF_TOKEN }}
        run: make ci

      - name: Validate Helm chart
        run: |
          helm dependency update charts/egress
          helm lint charts/egress
          helm template egress charts/egress
